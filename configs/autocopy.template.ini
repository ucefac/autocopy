# AutoCopy 配置文件模板
# 配置文件路径: ~/.config/autocopy/autocopy.ini
# 修改配置后需要重启应用生效

[General]
# 是否启用自动复制功能
# 类型: 布尔值 (true/false)
# 默认值: true
autoCopyEnabled = true

# 双击/三击的时间间隔（秒）
# 两次点击间隔小于此值才会被判定为双击/三击
# 类型: 浮点数
# 默认值: 0.4，范围建议: 0.2 ~ 0.8
doubleClickInterval = 0.4

# 点击判定的最大像素偏移
# 两次连续点击的位置偏移小于此值才会被判定为同一点的多次点击
# 类型: 整数（像素）
# 默认值: 5，范围建议: 3 ~ 10
maxClickOffset = 5

# 最小按压时长（秒）
# 鼠标按下到释放的时长低于此值才会被判定为点击，超过则判定为长按/拖拽
# 类型: 浮点数
# 默认值: 0.5，范围建议: 0.3 ~ 1.0
minPressDuration = 0.5

# 是否显示复制成功的Toast提示
# 类型: 布尔值 (true/false)
# 默认值: true
showToast = true

# 日志输出级别
# 可选值: debug < info < warn < error，低于设置级别的日志不会被记录
# debug: 输出所有调试信息，开发排查问题时使用
# info: 输出正常运行信息，默认级别
# warn: 仅输出警告和错误信息
# error: 仅输出错误信息
# 类型: 字符串
# 默认值: info
logLevel = debug

# 是否设置应用开机自动启动
# 类型: 布尔值 (true/false)
# 默认值: false
launchAtLogin = false

[Advanced]
# 排除的应用Bundle ID列表，多个用逗号分隔
# 在这些应用中选中文本不会触发自动复制，适合IDE、编辑器等自带选中文本逻辑的应用
# 类型: 逗号分隔的字符串
# 默认值: com.apple.dt.Xcode, com.microsoft.VSCode
excludedApps = com.apple.dt.Xcode, com.microsoft.VSCode

# Toast提示显示时长（秒）
# 复制成功后提示框的显示时间
# 类型: 浮点数
# 默认值: 0.7，范围建议: 0.3 ~ 3.0
toastDisplayDuration = 0.7

# 是否启用拖拽选择自动复制
# 启用后，拖拽鼠标选中文本时也会自动复制
# 类型: 布尔值 (true/false)
# 默认值: true
enableDragCopy = true